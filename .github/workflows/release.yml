name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  package:
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifact-name: macos-dmg
            artifact-path: release/*.dmg
          - os: windows-latest
            script: dist:win
            artifact-name: windows-exe
            artifact-path: release/*.exe
          - os: ubuntu-latest
            script: dist:linux
            artifact-name: linux-appimage
            artifact-path: release/*.AppImage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare optional signing credentials
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

            if [[ -n "${MAC_CSC_LINK:-}" ]]; then
              echo "CSC_LINK=$MAC_CSC_LINK" >> "$GITHUB_ENV"
              echo "CSC_KEY_PASSWORD=$MAC_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
            fi

            if [[ -n "${APPLE_API_KEY_BASE64:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
              python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_id = os.environ["APPLE_API_KEY_ID"]
          key_dir = Path(os.environ["RUNNER_TEMP"]) / "notary"
          key_dir.mkdir(parents=True, exist_ok=True)
          key_path = key_dir / f"AuthKey_{key_id}.p8"
          key_path.write_bytes(base64.b64decode(os.environ["APPLE_API_KEY_BASE64"]))

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"APPLE_API_KEY={key_path}\n")
              env_file.write(f"APPLE_API_KEY_ID={key_id}\n")
              env_file.write(f"APPLE_API_ISSUER={os.environ['APPLE_API_ISSUER']}\n")
          PY
            fi
          fi

          if [[ "$RUNNER_OS" == "Windows" && -n "${WIN_CSC_LINK:-}" ]]; then
            echo "WIN_CSC_LINK=$WIN_CSC_LINK" >> "$GITHUB_ENV"
            echo "WIN_CSC_KEY_PASSWORD=$WIN_CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Package desktop app
        run: pnpm ${{ matrix.script }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find dist-artifacts -type f)
          gh release create "$GITHUB_REF_NAME" "${assets[@]}" --generate-notes --title "$GITHUB_REF_NAME"
